# Pages CMS configuration — https://pagescms.org
#
# This file only tells Pages CMS which folders/fields to edit. It does not
# grant access by itself: editing still requires signing in at
# app.pagescms.org with a GitHub account that has write access to this
# repository (thereisnoriver/thereisnoriver.github.io). No token, password,
# or secret lives in this repo or in the site's frontend.

media:
  input: src/content/post/_assets
  output: ./_assets

content:
  - name: post
    label: 게시글
    type: collection
    path: src/content/post
    filename:
      template: "{primary}.md"
      field: create
    operations:
      rename: false # filename is the URL slug — renaming would break published links
    view:
      fields: [title, publishDate, draft]
      primary: title
      sort: [publishDate, title]
      default:
        sort: publishDate
        order: desc
    fields:
      - name: title
        label: 제목
        type: string
        required: true
        options:
          maxlength: 120

      - name: description
        label: 설명
        type: text
        required: true
        options:
          minlength: 10
          maxlength: 160

      - name: publishDate
        label: 발행일
        type: date
        required: true
        options:
          format: yyyy-MM-dd

      - name: updatedDate
        label: 수정일
        type: date
        default: ""
        options:
          format: yyyy-MM-dd

      - name: tags
        label: 태그
        type: string
        list: true

      - name: draft
        label: 초안 (체크 시 배포에서 제외)
        type: boolean
        default: false

      - name: coverImage
        label: 커버 이미지
        type: object
        fields:
          - name: src
            label: 이미지
            type: image
          - name: alt
            label: 대체 텍스트
            type: string

      - name: body
        label: 본문
        type: rich-text
        options:
          format: markdown

  - name: home
    label: 홈 화면
    type: file
    path: src/data/home.json
    format: json
    operations:
      delete: false # 삭제하면 빌드가 깨짐 (site.config.ts가 이 파일을 읽음)
    fields:
      - name: description
        label: 소개 문구 (홈 히어로 문구 · 메타 설명 · RSS 설명에 공통 사용)
        type: text
        required: true
        options:
          minlength: 10
          maxlength: 300

      - name: social
        label: 소셜 링크
        type: object
        fields:
          - name: github
            label: GitHub URL
            type: string
          - name: linkedin
            label: LinkedIn URL
            type: string
          - name: email
            label: 이메일
            type: string

  - name: showcase
    label: 쇼케이스
    type: file
    path: src/data/showcase.json
    format: json
    operations:
      delete: false # 삭제하면 빌드가 깨짐 (src/data/showcase.ts가 이 파일을 읽음)
    fields:
      - name: items
        label: 프로젝트 목록
        type: object
        list: true
        fields:
          - name: name
            label: 이름
            type: string
            required: true
          - name: href
            label: 링크
            type: string
            required: true
          - name: stack
            label: 스택
            type: string
          - name: badge
            label: 배지
            type: string
          - name: desc
            label: 설명
            type: text
